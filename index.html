<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gato Café</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#f7f1e7;
      color:#4b3626;
      text-align:center;
    }
    header{
      background:#7a6a42;
      color:white;
      padding:30px 15px;
    }
    main{
      max-width:900px;
      margin:0 auto;
      padding:20px;
    }
    section{
      margin:30px 0;
      background:white;
      border-radius:18px;
      padding:15px;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    }
    img{
      width:100%;
      height:auto;
      border-radius:14px;
    }
    .btn{
      display:inline-block;
      margin-top:15px;
      background:#25D366;
      color:white;
      text-decoration:none;
      padding:14px 22px;
      border-radius:999px;
      font-weight:bold;
    }
    footer{
      padding:20px;
      font-size:14px;
      color:#6b5a46;
    }
  </style>
</head>
<body>
  <header>
    <h1>GATO CAFÉ</h1>
    <p>El rincón perfecto para amantes del café y los gatos</p>
    <p>📍 2av 15-48 zona 3 ciudad</p>
    <p>🕒 Lunes a sábado de 11:00 am a 10:00 pm</p>
    <p>📲 +502 3184 9712</p>
    <p>@Gatocafe</p>
  </header>

  <main>
    <section>
      <h2>menú de comidas</h2>
      <img src="menu-comida-gato.png" alt="menú de comidas">
    </section>

    <section>
      <h2>bebidas frías</h2>
      <img src="bebidas-frias.png" alt="bebidas frías">
    </section>

    <section>
      <h2>bebidas calientes</h2>
      <img src="bebidas-calientes.png" alt="bebidas calientes">
    </section>

    <section>
      <h2>Pedidos por WhatsApp</h2>
      <a class="btn" href="https://wa.me/50231849712" target="_blank">Enviar pedido</a>
    </section>
  </main>

  <footer>
    Gracias por visitar Gato Café
  </footer>
</body>
</html>
